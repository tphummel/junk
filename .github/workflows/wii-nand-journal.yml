name: wii-nand-journal

on:
  push:
    branches:
      - main
    tags:
      - 'wii-nand-journal-v*'
    paths:
      - 'wii-nand-journal/**'
      - '.github/workflows/wii-nand-journal.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'wii-nand-journal/**'
      - '.github/workflows/wii-nand-journal.yml'

defaults:
  run:
    working-directory: wii-nand-journal

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "gofmt needs to be run on:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Test
        run: go test -v ./...

  release:
    if: startsWith(github.ref, 'refs/tags/wii-nand-journal-v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="wii-journal-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags="-s -w" -o "$out" .
          if [ "$GOOS" = "windows" ]; then
            zip "${out%.exe}.zip" "$out" README.md
            echo "ASSET=wii-nand-journal/${out%.exe}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${out}.tar.gz" "$out" README.md
            echo "ASSET=wii-nand-journal/${out}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
